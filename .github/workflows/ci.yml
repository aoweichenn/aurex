name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

jobs:
  coverage:
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y clang cmake gcc-c++ git gtest-devel llvm llvm-devel make time
      - name: Configure tool paths
        run: |
          {
            echo "LLVM_COV=$(command -v llvm-cov)"
            echo "LLVM_PROFDATA=$(command -v llvm-profdata)"
            echo "CC=$(command -v clang)"
            echo "CXX=$(command -v clang++)"
          } >> "${GITHUB_ENV}"
      - name: Check coverage
        env:
          AUREX_COVERAGE_LINE_THRESHOLD: "95"
          AUREX_COVERAGE_FUNCTION_THRESHOLD: "95"
          AUREX_COVERAGE_REGION_THRESHOLD: "95"
        run: tools/check_coverage.sh
  frontend-only:
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install frontend-only dependencies
        run: |
          dnf install -y clang cmake gcc-c++ git gtest-devel make
      - name: Configure tool paths
        run: |
          {
            echo "CC=$(command -v clang)"
            echo "CXX=$(command -v clang++)"
          } >> "${GITHUB_ENV}"
      - name: Configure frontend-only build
        run: cmake -S . -B build-frontend-only -DAUREX_FRONTEND_ONLY=ON
      - name: Build frontend-only targets
        run: cmake --build build-frontend-only -j
      - name: Run frontend-only tests
        run: ctest --test-dir build-frontend-only --output-on-failure
  stress-thresholds:
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y clang cmake gcc-c++ git gtest-devel llvm llvm-devel make time
      - name: Configure tool paths
        run: |
          {
            echo "CC=$(command -v clang)"
            echo "CXX=$(command -v clang++)"
          } >> "${GITHUB_ENV}"
      - name: Check stress thresholds
        env:
          AUREX_PERF_THRESHOLD_PROFILE: "github-ubuntu-24.04-fedora"
          AUREX_PERF_THRESHOLD_SCALE: "1.0"
          AUREX_GENERIC_STRESS_COUNTS: "100,200"
          AUREX_GENERIC_STRESS_SHAPE: "mixed"
          AUREX_GENERIC_STRESS_MAX_RSS_MIB: "512"
          AUREX_GENERIC_STRESS_MAX_ELAPSED_MS: "30000"
          AUREX_AST_STRESS_COUNTS: "1000,5000"
          AUREX_AST_STRESS_SHAPE: "mixed"
          AUREX_AST_STRESS_MAX_RSS_MIB: "512"
          AUREX_AST_STRESS_MAX_ELAPSED_MS: "30000"
          AUREX_DIAGNOSTIC_STRESS_COUNTS: "100,500"
          AUREX_DIAGNOSTIC_STRESS_SHAPE: "mixed"
          AUREX_DIAGNOSTIC_STRESS_MAX_RSS_MIB: "512"
          AUREX_DIAGNOSTIC_STRESS_MAX_ELAPSED_MS: "30000"
        run: make perf-stress-threshold
  release-stress-thresholds:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y clang cmake gcc-c++ git gtest-devel llvm llvm-devel make time
      - name: Configure tool paths
        run: |
          {
            echo "CC=$(command -v clang)"
            echo "CXX=$(command -v clang++)"
          } >> "${GITHUB_ENV}"
      - name: Check release stress thresholds
        env:
          AUREX_PERF_THRESHOLD_PROFILE: "github-ubuntu-24.04-fedora-release"
          AUREX_PERF_THRESHOLD_SCALE: "1.0"
        run: make perf-release-threshold
