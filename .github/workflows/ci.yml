name: CI

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y clang cmake gcc-c++ git gtest-devel llvm llvm-devel make
      - name: Check coverage
        env:
          CC: clang
          CXX: clang++
          AUREX_COVERAGE_LINE_THRESHOLD: "90"
          AUREX_COVERAGE_FUNCTION_THRESHOLD: "90"
          AUREX_COVERAGE_REGION_THRESHOLD: "90"
        run: tools/check_coverage.sh
